<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f2540" />
  <title>Empowered Summit NYC</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗽</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-icon">🗽</span>
        <div>
          <div class="brand-title" id="brand-title">Empowered Summit NYC</div>
          <div class="brand-sub" id="brand-dates">June 18–21, 2026</div>
        </div>
      </div>
      <div class="topbar-actions">
        <div id="lang-toggle"></div>
        <button id="today-btn" class="today-btn" type="button">Today</button>
      </div>
    </div>
  </header>

  <div id="group-toggle"></div>

  <main id="app">
    <p class="loading" id="loading">Loading your trip…</p>
    <section id="overview" class="section"></section>
    <section id="schedule" class="section"></section>
    <section id="places" class="section"></section>
    <section id="routes" class="section"></section>
    <section id="highlights" class="section"></section>
  </main>

  <nav class="bottomnav" aria-label="Section navigation">
    <a href="#overview" data-nav="overview"><span class="nav-ico">📋</span><span class="nav-label">Overview</span></a>
    <a href="#schedule" data-nav="schedule"><span class="nav-ico">🗓️</span><span class="nav-label">Schedule</span></a>
    <a href="#places" data-nav="places"><span class="nav-ico">📍</span><span class="nav-label">Places</span></a>
    <a href="#routes" data-nav="routes"><span class="nav-ico">🚇</span><span class="nav-label">Routes</span></a>
    <a href="#highlights" data-nav="highlights"><span class="nav-ico">⭐</span><span class="nav-label">Group</span></a>
  </nav>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
