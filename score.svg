<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="First-Time NYC Sightseeing score: 9.5 out of 10, time-adjusted. Score generated by Claude Code.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f2540"/>
      <stop offset="1" stop-color="#1c3a5e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd95a"/>
      <stop offset="1" stop-color="#f0b429"/>
    </linearGradient>
    <symbol id="star" viewBox="0 0 24 24">
      <path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.401 8.169L12 18.896l-7.335 3.871 1.401-8.169L.132 9.21l8.2-1.192z"/>
    </symbol>
    <clipPath id="card"><rect x="8" y="8" width="804" height="584" rx="30"/></clipPath>
    <clipPath id="starclip"><rect x="294" y="332" width="220" height="52"/></clipPath>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="804" height="584" rx="30" fill="url(#bg)" stroke="#0e9aa7" stroke-width="3"/>

  <!-- header -->
  <text x="410" y="64" text-anchor="middle" fill="#7fd4d0" font-size="17" font-weight="700" letter-spacing="3">EMPOWERED SUMMIT NYC · JUNE 18–21, 2026</text>
  <text x="410" y="104" text-anchor="middle" fill="#ffffff" font-size="27" font-weight="800" letter-spacing="1.5">FIRST-TIME NYC SIGHTSEEING</text>
  <line x1="320" y1="124" x2="500" y2="124" stroke="#0e9aa7" stroke-width="2"/>
  <text x="410" y="156" text-anchor="middle" fill="#aac4e0" font-size="16" font-weight="700" letter-spacing="2">TIME-ADJUSTED SCORE</text>

  <!-- big score -->
  <text x="410" y="312" text-anchor="middle" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#gold)" font-size="150">9.5</tspan><tspan fill="#7fd4d0" font-size="56" dx="6">/10</tspan>
  </text>

  <!-- stars (95% filled) -->
  <use href="#star" x="294" y="340" width="40" height="40" fill="#33527a"/>
  <use href="#star" x="342" y="340" width="40" height="40" fill="#33527a"/>
  <use href="#star" x="390" y="340" width="40" height="40" fill="#33527a"/>
  <use href="#star" x="438" y="340" width="40" height="40" fill="#33527a"/>
  <use href="#star" x="486" y="340" width="40" height="40" fill="#33527a"/>
  <g clip-path="url(#starclip)">
    <use href="#star" x="294" y="340" width="40" height="40" fill="url(#gold)"/>
    <use href="#star" x="342" y="340" width="40" height="40" fill="url(#gold)"/>
    <use href="#star" x="390" y="340" width="40" height="40" fill="url(#gold)"/>
    <use href="#star" x="438" y="340" width="40" height="40" fill="url(#gold)"/>
    <use href="#star" x="486" y="340" width="40" height="40" fill="url(#gold)"/>
  </g>

  <!-- verdict + categories -->
  <text x="410" y="430" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="600">Whole-island in one Friday night. All iconic. Zero reservations.</text>
  <text x="410" y="462" text-anchor="middle" fill="#7fd4d0" font-size="15" font-weight="700" letter-spacing="0.5">ICONS 8 · FOOD 9 · VARIETY 9 · VALUE 10 · PACING 7</text>

  <!-- skyline + footer (clipped to card) -->
  <g clip-path="url(#card)">
    <g fill="#13304f">
      <rect x="30" y="512" width="38" height="30"/>
      <rect x="74" y="498" width="26" height="44"/>
      <rect x="106" y="520" width="34" height="22"/>
      <rect x="150" y="486" width="22" height="56"/>
      <rect x="180" y="508" width="40" height="34"/>
      <rect x="700" y="506" width="34" height="36"/>
      <rect x="740" y="492" width="24" height="50"/>
      <rect x="770" y="516" width="30" height="26"/>
      <rect x="660" y="520" width="34" height="22"/>
    </g>
    <text x="615" y="506" font-size="34">🗽</text>
    <rect x="8" y="540" width="804" height="52" fill="#0e9aa7"/>
    <text x="410" y="573" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Score generated by Claude Code ✨</text>
  </g>
</svg>
